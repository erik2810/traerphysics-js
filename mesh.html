<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Mesh Grid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<script>
    let particles = [];
    let springs = [];
    let gridSize = 5;
    let spacing = 60;
    let dragging = false;
    let dragParticle = null;
    let dragOffset = null;

    class Particle {
        constructor(x, y, z) {
            this.pos = createVector(x, y, z);
            this.velocity = createVector(random(-0.5, 0.5), random(-0.5, 0.5), random(-0.5, 0.5));
            this.acceleration = createVector(0, 0, 0);
            this.mass = 1.5;
            this.radius = this.mass * 5;
            this.maxSpeed = 3;
        }

        addForce(f) {
            let force = f.copy();
            this.acceleration.add(force.div(this.mass));
        }

        updateState() {
            if (!dragging || this !== dragParticle) {
                this.velocity.add(this.acceleration);
                this.limitVelocities();
                this.pos.add(this.velocity);
            }
            this.acceleration.mult(0);
        }

        limitVelocities() {
            let speed = this.velocity.mag();
            if (speed > this.maxSpeed) {
                this.velocity.mult(this.maxSpeed / speed);
            }
        }

        checkEdges() {
            let margin = 250;
            if (this.pos.x - this.radius < -margin) {
                this.pos.x = -margin + this.radius;
                this.velocity.x *= -1;
            } else if (this.pos.x + this.radius > margin) {
                this.pos.x = margin - this.radius;
                this.velocity.x *= -1;
            }
            if (this.pos.y - this.radius < -margin) {
                this.pos.y = -margin + this.radius;
                this.velocity.y *= -1;
            } else if (this.pos.y + this.radius > margin) {
                this.pos.y = margin - this.radius;
                this.velocity.y *= -1;
            }
            if (this.pos.z - this.radius < -margin) {
                this.pos.z = -margin + this.radius;
                this.velocity.z *= -1;
            } else if (this.pos.z + this.radius > margin) {
                this.pos.z = margin - this.radius;
                this.velocity.z *= -1;
            }
        }

        checkCollision() {
            for (let other of particles) {
                if (this !== other) {
                    let distance = this.pos.dist(other.pos);
                    let minDistance = this.radius + other.radius;
                    if (distance <= minDistance && distance > 0) {
                        let normal = p5.Vector.sub(other.pos, this.pos).normalize();
                        let relativeVelocity = p5.Vector.sub(other.velocity, this.velocity);
                        let impulse = p5.Vector.mult(normal, 2 * p5.Vector.dot(relativeVelocity, normal) / 2);
                        let repulsion = p5.Vector.mult(normal, minDistance - distance);

                        this.velocity.add(p5.Vector.div(impulse, this.mass));
                        other.velocity.sub(p5.Vector.div(impulse, other.mass));
                        this.pos.sub(p5.Vector.div(repulsion, this.mass));
                        other.pos.add(p5.Vector.div(repulsion, other.mass));
                    }
                }
            }
        }

        display() {
            push();
            translate(this.pos.x, this.pos.y, this.pos.z);
            fill(dragging && this === dragParticle ? color(255, 100, 100) : color(100, 150, 255));
            noStroke();
            sphere(this.radius);
            pop();
        }

        displayDirection() {
            push();
            strokeWeight(2);
            stroke(255, 0, 0);
            line(this.pos.x, this.pos.y, this.pos.z,
                this.pos.x + this.velocity.x * 5,
                this.pos.y + this.velocity.y * 5,
                this.pos.z + this.velocity.z * 5);
            stroke(0, 0, 255);
            line(this.pos.x, this.pos.y, this.pos.z,
                this.pos.x + this.acceleration.x * 5,
                this.pos.y + this.acceleration.y * 5,
                this.pos.z + this.acceleration.z * 5);
            pop();
        }
    }

    class Spring {
        constructor(particleA, particleB, leng, stiff) {
            this.particleA = particleA;
            this.particleB = particleB;
            this.restLength = leng;
            this.stiffness = stiff;
            this.damping = 0.05;
        }

        update() {
            let d = p5.Vector.sub(this.particleA.pos, this.particleB.pos);
            let dst = d.mag();
            if (dst === 0) return;

            let distention = dst - this.restLength;
            let restorativeForce = this.stiffness * distention;
            let f = p5.Vector.mult(p5.Vector.div(d, dst), restorativeForce);

            this.particleA.addForce(p5.Vector.mult(f, -1));
            this.particleB.addForce(f);

            let dampingForce = p5.Vector.mult(
                p5.Vector.sub(this.particleA.velocity, this.particleB.velocity),
                this.damping
            );
            this.particleA.addForce(p5.Vector.mult(dampingForce, -1));
            this.particleB.addForce(dampingForce);
        }

        display() {
            stroke(80, 120, 180, 150);
            strokeWeight(1);
            line(this.particleA.pos.x, this.particleA.pos.y, this.particleA.pos.z,
                this.particleB.pos.x, this.particleB.pos.y, this.particleB.pos.z);
        }
    }

    function setup() {
        createCanvas(800, 600, WEBGL);

        let particle_grid = [];
        for (let x = 0; x < gridSize; x++) {
            let column = [];
            for (let y = 0; y < gridSize; y++) {
                let row = [];
                for (let z = 0; z < gridSize; z++) {
                    let px = (x - gridSize/2) * spacing;
                    let py = (y - gridSize/2) * spacing;
                    let pz = (z - gridSize/2) * spacing;
                    row.push(new Particle(px, py, pz));
                }
                column.push(row);
            }
            particle_grid.push(column);
        }

        for (let x = 0; x < gridSize - 1; x++) {
            for (let y = 0; y < gridSize - 1; y++) {
                for (let z = 0; z < gridSize - 1; z++) {
                    springs.push(new Spring(particle_grid[x][y][z], particle_grid[x+1][y][z], spacing, 0.13));
                    springs.push(new Spring(particle_grid[x][y][z], particle_grid[x][y+1][z], spacing, 0.13));
                    springs.push(new Spring(particle_grid[x][y][z], particle_grid[x][y][z+1], spacing, 0.13));
                    springs.push(new Spring(particle_grid[x][y][z], particle_grid[x+1][y+1][z], spacing * sqrt(2), 0.13));
                    springs.push(new Spring(particle_grid[x][y+1][z], particle_grid[x+1][y][z], spacing * sqrt(2), 0.13));
                    springs.push(new Spring(particle_grid[x][y][z], particle_grid[x+1][y][z+1], spacing * sqrt(2), 0.13));
                    springs.push(new Spring(particle_grid[x][y][z+1], particle_grid[x+1][y][z], spacing * sqrt(2), 0.13));
                    springs.push(new Spring(particle_grid[x][y][z], particle_grid[x][y+1][z+1], spacing * sqrt(2), 0.13));
                    springs.push(new Spring(particle_grid[x][y][z+1], particle_grid[x][y+1][z], spacing * sqrt(2), 0.13));
                }
            }
        }

        for (let y = 0; y < gridSize - 1; y++) {
            for (let z = 0; z < gridSize - 1; z++) {
                springs.push(new Spring(particle_grid[gridSize-1][y][z], particle_grid[gridSize-1][y+1][z], spacing, 0.13));
                springs.push(new Spring(particle_grid[gridSize-1][y][z], particle_grid[gridSize-1][y][z+1], spacing, 0.13));
            }
        }

        for (let x = 0; x < gridSize - 1; x++) {
            for (let z = 0; z < gridSize - 1; z++) {
                springs.push(new Spring(particle_grid[x][gridSize-1][z], particle_grid[x+1][gridSize-1][z], spacing, 0.13));
                springs.push(new Spring(particle_grid[x][gridSize-1][z], particle_grid[x][gridSize-1][z+1], spacing, 0.13));
            }
        }

        for (let x = 0; x < gridSize - 1; x++) {
            for (let y = 0; y < gridSize - 1; y++) {
                springs.push(new Spring(particle_grid[x][y][gridSize-1], particle_grid[x+1][y][gridSize-1], spacing, 0.13));
                springs.push(new Spring(particle_grid[x][y][gridSize-1], particle_grid[x][y+1][gridSize-1], spacing, 0.13));
            }
        }

        for (let x = 0; x < gridSize; x++) {
            for (let y = 0; y < gridSize; y++) {
                for (let z = 0; z < gridSize; z++) {
                    particles.push(particle_grid[x][y][z]);
                }
            }
        }
    }

    function draw() {
        background(20);

        if (!dragging) {
            orbitControl();
        }

        for (let s of springs) {
            s.update();
            s.display();
        }

        for (let p of particles) {
            p.checkCollision();
            p.checkEdges();
            p.updateState();
            p.limitVelocities();
            p.display();
            p.displayDirection();
        }
    }

    function mousePressed() {
        let minDist = Infinity;
        dragParticle = null;

        let cam = this._renderer._curCamera;

        for (let p of particles) {
            let pos = p.pos.copy();
            let modelView = cam.cameraMatrix.copy();
            let projection = cam.projMatrix.copy();

            let transformed = createVector(pos.x, pos.y, pos.z, 1);

            let mvMat = modelView.mat4;
            let x = mvMat[0] * transformed.x + mvMat[4] * transformed.y + mvMat[8] * transformed.z + mvMat[12];
            let y = mvMat[1] * transformed.x + mvMat[5] * transformed.y + mvMat[9] * transformed.z + mvMat[13];
            let z = mvMat[2] * transformed.x + mvMat[6] * transformed.y + mvMat[10] * transformed.z + mvMat[14];
            let w = mvMat[3] * transformed.x + mvMat[7] * transformed.y + mvMat[11] * transformed.z + mvMat[15];

            let projMat = projection.mat4;
            let sx = projMat[0] * x + projMat[4] * y + projMat[8] * z + projMat[12] * w;
            let sy = projMat[1] * x + projMat[5] * y + projMat[9] * z + projMat[13] * w;
            let sw = projMat[3] * x + projMat[7] * y + projMat[11] * z + projMat[15] * w;

            if (sw !== 0) {
                sx /= sw;
                sy /= sw;
            }

            let screenX = (sx * 0.5 + 0.5) * width;
            let screenY = (1 - (sy * 0.5 + 0.5)) * height;

            let distance = dist(mouseX, mouseY, screenX, screenY);

            if (distance <= p.radius * 2 && distance < minDist) {
                minDist = distance;
                dragParticle = p;
                dragging = true;
            }
        }

        if (dragParticle) {
            dragOffset = createVector(
                dragParticle.pos.x - (mouseX - width/2),
                dragParticle.pos.y - (mouseY - height/2),
                dragParticle.pos.z
            );
        }
    }

    function mouseDragged() {
        if (dragging && dragParticle) {
            dragParticle.pos.x = (mouseX - width/2) + (dragOffset ? dragOffset.x : 0);
            dragParticle.pos.y = (mouseY - height/2) + (dragOffset ? dragOffset.y : 0);
            dragParticle.velocity.mult(0);
        }
    }

    function mouseReleased() {
        dragging = false;
        dragParticle = null;
        dragOffset = null;
    }
</script>
</body>
</html>
